name: keepalive
# Бесплатный Supabase засыпает после ~7 дней НЕДОСТАТОЧНОЙ активности БД (plan §11).
# Важно: таймер обнуляет РЕАЛЬНЫЙ запрос к БД (наш SELECT через REST — считается),
# и Supabase хочет активность, размазанную по неделе («несколько запросов в день»),
# а не 1-2 пинга. Плюс scheduled-джобы GitHub ненадёжны (задержки/пропуски).
# Поэтому гоняем ДВАЖДЫ В ДЕНЬ: даже если часть запусков GitHub пропустит,
# запрос к БД всё равно приходит каждый день -> проект не спит -> pg_cron жив.
# (Раньше было ×2/нед — оказалось слишком редко, проект уснул 2026-07-14.)
on:
  schedule:
    - cron: '17 6 * * *'    # каждый день 06:17 UTC (~09:17 МСК)
    - cron: '17 18 * * *'   # каждый день 18:17 UTC (~21:17 МСК)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST (resets idle timer)
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/drivers?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}")
          echo "HTTP $code"
          test "$code" = "200"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
