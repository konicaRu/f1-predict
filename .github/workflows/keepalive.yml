name: keepalive
# Бесплатный Supabase засыпает после ~7 дней недостаточной активности БД (plan §11).
# ВАЖНЫЙ УРОК (инцидент 2026-07-14): прежний SELECT под RLS возвращал 0 строк (анон —
# не член лиги) и НЕ считался активностью, хотя джоба была зелёной → проект уснул.
# Теперь дёргаем RPC keepalive_ping() — он делает РЕАЛЬНЫЙ UPDATE (SECURITY DEFINER,
# в обход RLS) = однозначная активность БД. Плюс ДВАЖДЫ В ДЕНЬ (scheduled-джобы GitHub
# ненадёжны, берём частотой) → таймер простоя обнуляется → проект жив → pg_cron жив.
on:
  schedule:
    - cron: '17 6 * * *'    # каждый день 06:17 UTC (~09:17 МСК)
    - cron: '17 18 * * *'   # каждый день 18:17 UTC (~21:17 МСК)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase RPC keepalive_ping (real UPDATE, resets idle timer)
        run: |
          resp=$(curl -s -w "\n%{http_code}" -X POST \
            "${SUPABASE_URL}/rest/v1/rpc/keepalive_ping" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json")
          body=$(echo "$resp" | head -n -1)
          code=$(echo "$resp" | tail -n1)
          echo "HTTP $code, pinged_at=$body"
          test "$code" = "200"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
