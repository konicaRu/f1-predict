name: telegram-notify
# Напоминания, автозабор и итоги гонок в общий Telegram-чат (спеки
# docs/superpowers/specs/2026-07-19-telegram-notify-design.md,
# docs/superpowers/specs/2026-07-20-autoresults-design.md). Расписание в UTC, МСК = UTC+3
# (в России нет перехода на летнее время).
on:
  schedule:
    # Минута сдвинута с :00 на :05 — GitHub Actions официально предупреждает, что
    # запланированные запуски могут задерживаться или пропускаться при высокой
    # нагрузке, а начало каждого часа — самое нагруженное время.
    - cron: '5 7 * * 1'    # Пн 10:05 МСК — raceweek + remind
    - cron: '5 7 * * 3'    # Ср 10:05 МСК — deadline
    - cron: '5 16 * * 3'   # Ср 19:05 МСК — deadline
    - cron: '5 7 * * 4'    # Чт 10:05 МСК — aiplayer (прогноз ИИ до дедлайна) + deadline
    - cron: '5 16 * * 4'   # Чт 19:05 МСК — deadline
    - cron: '5 */2 * * *'  # каждые 2 часа — autoresults (забор) + results (объявление)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Режим (для ручного запуска)'
        required: true
        type: choice
        options: [raceweek, deadline, results, remind, autoresults, aiplayer]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Определить режимы
        id: mode
        run: |
          if [ -n "${{ inputs.mode }}" ]; then
            echo "modes=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            case "${{ github.event.schedule }}" in
              '5 7 * * 1') echo "modes=raceweek remind" >> "$GITHUB_OUTPUT" ;;
              '5 7 * * 3'|'5 16 * * 3'|'5 16 * * 4') echo "modes=deadline" >> "$GITHUB_OUTPUT" ;;
              '5 7 * * 4') echo "modes=aiplayer deadline" >> "$GITHUB_OUTPUT" ;;
              '5 */2 * * *') echo "modes=autoresults results" >> "$GITHUB_OUTPUT" ;;
              *) echo "ERR неизвестное расписание: ${{ github.event.schedule }}"; exit 1 ;;
            esac
          fi
      - name: Записать .env для scripts/telegram, scripts/autoresults, scripts/ai-player
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cat > .env <<EOF
          SUPABASE_DB_URL=$SUPABASE_DB_URL
          TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
          TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID
          GEMINI_API_KEY=$GEMINI_API_KEY
          EOF
      - name: npm install
        run: |
          cd scripts/telegram && npm install
          cd ../autoresults && npm install
          cd ../ai-player && npm install
      - name: Запустить режимы
        run: |
          for m in ${{ steps.mode.outputs.modes }}; do
            if [ "$m" = "autoresults" ]; then
              node scripts/autoresults/fetch.js
            elif [ "$m" = "aiplayer" ]; then
              node scripts/ai-player/predict.js || echo "::warning::aiplayer failed, continuing"
            else
              node scripts/telegram/notify.js "$m"
            fi
          done
