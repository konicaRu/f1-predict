name: Deploy to GitHub Pages

# Собирает Vite-приложение и публикует на GitHub Pages при пуше в main.
# VITE-переменные берутся из GitHub-секретов (anon-ключ публичен, но держим вне репо
# ради единой политики .gitignore). Source в Settings → Pages должен быть "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Не гоняем параллельные деплои; свежий пуш отменяет предыдущий незавершённый.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      # SPA-фолбэк: Pages отдаёт 404.html на неизвестных путях; кладём туда индекс,
      # чтобы прямые ссылки/refresh на /calendar, /predict/:id грузили приложение (BrowserRouter).
      - name: SPA 404 fallback
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
